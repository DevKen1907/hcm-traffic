<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>HCM Traffic Monitor Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 10px; line-height: 1.5; }
        .header { text-align: center; padding: 15px; background: #1a1a1a; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        #map { height: 400px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; z-index: 1; }
        .list-container { background: #1a1a1a; border-radius: 12px; padding: 5px; border: 1px solid #333; }
        .location-item { 
            display: flex; justify-content: space-between; align-items: center; padding: 14px 15px; 
            border-bottom: 1px solid #2a2a2a; font-size: 14px; 
        }
        .location-item:last-child { border-bottom: none; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .bg-red { background-color: #ff5252; box-shadow: 0 0 8px #ff5252; }
        .bg-green { background-color: #00e676; box-shadow: 0 0 5px #00e676; }
        #global-status { font-weight: bold; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Hiệu ứng loading nhẹ */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading { animation: pulse 1.5s infinite; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px; color: #fff;">Giám sát Giao thông TP.HCM</h2>
        <div id="global-status" class="loading">Đang kết nối trung tâm dữ liệu...</div>
    </div>
    
    <div id="map"></div>

    <div class="list-container" id="location-list">
        </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
