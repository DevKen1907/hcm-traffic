<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HCM Traffic Pro - TomTom Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 10px; color: #333; }
        .header { text-align: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #1a73e8; }
        #map { height: 400px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #d1d9e0; z-index: 1; }
        .list-container { background: #fff; border-radius: 15px; border: 1px solid #d1d9e0; max-height: 400px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .list-header { padding: 12px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; font-weight: bold; font-size: 14px; position: sticky; top: 0; z-index: 10; color: #5f6368; }
        .location-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f8f9fa; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .location-item:hover { background: #f1f3f4; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .bg-red { background: #d93025; box-shadow: 0 0 5px #d93025; }
        .bg-green { background: #188038; }
        #global-status { font-weight: bold; font-size: 13px; margin-top: 8px; letter-spacing: 0.5px; }
        
        .fab-container { position: absolute; top: 100px; right: 20px; z-index: 1000; }
        .fab { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; background: #1a73e8; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="fab-container">
        <button class="fab" onclick="updateTrafficData()" title="Làm mới toàn bộ"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="header">
        <h2 style="margin:0; font-size: 18px; color: #1a73e8;">GIÁM SÁT GIAO THÔNG TRỰC TUYẾN</h2>
        <div id="global-status">Đang khởi tạo bản đồ...</div>
    </div>
    
    <div id="map"></div>
    <div class="list-container">
        <div class="list-header">TRẠNG THÁI 31 ĐIỂM NÓNG</div>
        <div id="location-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
